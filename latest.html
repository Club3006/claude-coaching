<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Brief — April 26, 2026</title>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #18181b;
    --surface-raised: #1f1f24;
    --text: #e8e8ea;
    --text-dim: #8e8e93;
    --accent: #e07a3c;
    --border: #2a2a2f;
    --attention-bg: #1e1a16;
    --attention-border: #e07a3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    font-size: 16px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 28px 80px;
  }
  .meta {
    color: var(--text-dim);
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 40px;
    color: var(--text);
  }
  h2 {
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin: 36px 0 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  ul, ol { margin-left: 20px; margin-bottom: 8px; }
  li { margin-bottom: 6px; color: var(--text); }
  p { margin-bottom: 12px; }
  code, .mono {
    font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
    font-size: 0.9em;
    background: var(--surface-raised);
    padding: 1px 6px;
    border-radius: 4px;
    color: var(--text);
  }
  .attention {
    background: var(--attention-bg);
    border-left: 3px solid var(--attention-border);
    padding: 20px 24px;
    margin: 24px 0;
    border-radius: 4px;
  }
  .attention h2 {
    margin-top: 0;
    border-bottom: none;
    padding-bottom: 0;
    color: var(--accent);
  }
  .notes {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .notes h2 { color: var(--text-dim); }
  .generated {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 64px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
<div class="page">
  <div class="meta">Daily Brief</div>
  <h1>April 26, 2026</h1>

  <p>No activity yesterday. Clear runway.</p>

  <div class="generated">
    Generated April 27, 2026 &mdash; America/New_York
  </div>
</div>
</body>
</html>
